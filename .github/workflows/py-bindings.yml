# This file is based on the output of:
#
#    maturin generate-ci github --pytest -m bindings/python/Cargo.toml
#
# Using maturin v1.7.1
name: Bindings Python

on:
  push:
    branches:
      - main
    tags:
      - "mla-bindings-py-v*"
  pull_request:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64
          - runner: ubuntu-24.04
            target: x86
          - runner: ubuntu-24.04
            target: aarch64
          - runner: ubuntu-24.04
            target: armv7
          - runner: ubuntu-24.04
            target: s390x
          - runner: ubuntu-24.04
            target: ppc64le

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path bindings/python/Cargo.toml
          sccache: 'false'
          manylinux: auto
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          MLA_WHEEL=$(find dist -name "mla_archive*.whl" | head -1)
          MLA_HASH=$(sha256sum "$MLA_WHEEL" | cut -d' ' -f1)
          cat > requirements.txt << EOF
          mla-archive @ file://$MLA_WHEEL --hash=sha256:$MLA_HASH
          pytest==9.0.2 --hash=sha256:711ffd45bf766d5264d487b917733b453d917afd2b0ad65223959f59089f875b
          EOF
          #pytest hash from https://pypi.org/pypi/pytest/9.0.2/json
          pip install -r requirements.txt --require-hashes --find-links dist --force-reinstall
          cd bindings/python && pytest
      - name: mypy stubtest and type checking
        if: ${{ startsWith(matrix.platform.target, 'x86_64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          echo "mypy==1.19.1 --hash=sha256:5f05aa3d375b385734388e844bc01733bd33c644ab48e9684faa54e5389775ec" > requirements.txt #https://pypi.org/pypi/mypy/1.19.1/json
          pip install -r requirements.txt --require-hashes  
          # it searchs for mla.mla but we can't have a module with the same name as the package
          # so we use mla.pyi instead of mla/__init__.pyi
          # and we need to use the --ignore-missing-stub option
          # to avoid errors about missing stubs for mla.mla
          stubtest --ignore-missing-stub mla
          # run type checking
          mypy bindings/python/examples/read.py
          mypy bindings/python/examples/write.py
          mypy bindings/python/tests/test_mla.py
          mypy bindings/python/tests/test_examples.py

  musllinux:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: ubuntu-24.04
            target: x86_64
          - runner: ubuntu-24.04
            target: x86
          - runner: ubuntu-24.04
            target: aarch64
          - runner: ubuntu-24.04
            target: armv7

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.11
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path bindings/python/Cargo.toml
          sccache: 'false'
          manylinux: musllinux_1_2
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - runner: windows-2025
            target: x64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
          architecture: ${{ matrix.platform.target }}
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path bindings/python/Cargo.toml
          sccache: 'false'
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        if: ${{ !startsWith(matrix.platform.target, 'aarch64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          MLA_WHEEL=$(find dist -name "mla_archive*.whl" | head -1)
          MLA_HASH=$(sha256sum "$MLA_WHEEL" | cut -d' ' -f1)
          cat > requirements.txt << EOF
          mla-archive @ file://$MLA_WHEEL --hash=sha256:$MLA_HASH
          pytest==9.0.2 --hash=sha256:711ffd45bf766d5264d487b917733b453d917afd2b0ad65223959f59089f875b
          EOF
          #pytest hash from https://pypi.org/pypi/pytest/9.0.2/json
          pip install -r requirements.txt --require-hashes --find-links dist --force-reinstall
          cd bindings/python && pytest
      - name: mypy stubtest and type checking
        if: ${{ !startsWith(matrix.platform.target, 'aarch64') }}
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/Scripts/activate
          echo "mypy==1.19.1 --hash=sha256:5f05aa3d375b385734388e844bc01733bd33c644ab48e9684faa54e5389775ec" > requirements.txt #https://pypi.org/pypi/mypy/1.19.1/json
          pip install -r requirements.txt --require-hashes  
          # it searchs for mla.mla but we can't have a module with the same name as the package
          # so we use mla.pyi instead of mla/__init__.pyi
          # and we need to use the --ignore-missing-stub option
          # to avoid errors about missing stubs for mla.mla
          stubtest --ignore-missing-stub mla
          # run type checking
          mypy bindings/python/examples/read.py
          mypy bindings/python/examples/write.py
          mypy bindings/python/tests/test_mla.py
          mypy bindings/python/tests/test_examples.py

  macos:
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          # no x86_64 targets as latest macos versions now default to aarch64, x86_64 is not available
          - runner: macos-15
            target: aarch64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'
      - name: Build wheels
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path bindings/python/Cargo.toml
          sccache: 'false'
      - name: Upload wheels
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: dist
      - name: pytest
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          MLA_WHEEL=$(find dist -name "mla_archive*.whl" | head -1)
          MLA_HASH=$(sha256sum "$MLA_WHEEL" | cut -d' ' -f1)
          cat > requirements.txt << EOF
          mla-archive @ file://$MLA_WHEEL --hash=sha256:$MLA_HASH
          pytest==9.0.2 --hash=sha256:711ffd45bf766d5264d487b917733b453d917afd2b0ad65223959f59089f875b
          EOF
          #pytest hash from https://pypi.org/pypi/pytest/9.0.2/json
          pip install -r requirements.txt --require-hashes --find-links dist --force-reinstall
          cd bindings/python && pytest
      - name: mypy stubtest and type checking
        shell: bash
        run: |
          set -e
          python3 -m venv .venv
          source .venv/bin/activate
          echo "mypy==1.19.1 --hash=sha256:5f05aa3d375b385734388e844bc01733bd33c644ab48e9684faa54e5389775ec" > requirements.txt #https://pypi.org/pypi/mypy/1.19.1/json
          pip install -r requirements.txt --require-hashes  
          # it searchs for mla.mla but we can't have a module with the same name as the package
          # so we use mla.pyi instead of mla/__init__.pyi
          # and we need to use the --ignore-missing-stub option
          # to avoid errors about missing stubs for mla.mla
          stubtest --ignore-missing-stub mla
          # run type checking
          mypy bindings/python/examples/read.py
          mypy bindings/python/examples/write.py
          mypy bindings/python/tests/test_mla.py
          mypy bindings/python/tests/test_examples.py
  sdist:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - name: Build sdist
        uses: PyO3/maturin-action@04ac600d27cdf7a9a280dadf7147097c42b757ad # v1.50.1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/python/Cargo.toml
      - name: Upload sdist
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-sdist
          path: dist

  release:
    name: Release python bindings
    runs-on: ubuntu-24.04
    if: ${{ startsWith(github.ref, 'refs/tags/mla-bindings-py-v') }}
    environment:
      name: pypi
      url: https://pypi.org/p/mla-archive
    needs: [linux, musllinux, windows, macos, sdist]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      - name: Move artifacts to dist
        run: |
          rm -rf dist
          mkdir dist
          mv wheels-*/* dist
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/
      - name: publish
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
