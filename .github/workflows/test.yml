name: Build & test

permissions: {}

on:
  push:
    branches: [ main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-24.04
            container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
          - build: macos
            os: macos-15
            # not available: set container value to null
            container: null
          - build: windows
            os: windows-2025
            # not available: set container value to null
            container: null
            extension: .exe
          - build: windows7-i686 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: i686-win7-windows-msvc
            cargo_arg: --target i686-win7-windows-msvc -Z build-std # Build std from source, needed for tier 3 target
            extension: .exe
          - build: windows7-x86_64 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: x86_64-win7-windows-msvc
            cargo_arg: --target x86_64-win7-windows-msvc -Z build-std # Build std from source, needed for tier 3 target
            extension: .exe

    runs-on: ${{matrix.os}}
    container: ${{matrix.container}}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set target if any
      # Skip rustup target add for win7 targets — rustup doesn't support these tier-3 targets
      if: matrix.target && !contains(matrix.target, 'win7')
      run: rustup target add ${{ matrix.target }}
    - name: Install rust-src (only for win7)
      # For win7 targets, manually build std by installing rust-src
      if: contains(matrix.target, 'win7')
      run: rustup component add rust-src
    - name: Cache build-std artifacts (only for win7)
      # Only apply caching to Win7 tier-3 targets that require build-std
      if: contains(matrix.target, 'win7')
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        # Cache the parts of target/ that contain compiled std artifacts for the given target
        path: |
          target/${{ matrix.target }}/release/build
          target/${{ matrix.target }}/release/deps
          target/${{ matrix.target }}/release/.fingerprint
        # Unique cache key: includes OS, target, and hash of Cargo.lock
        key: build-std-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        # If there's no exact match, fall back to older caches for the same target
        restore-keys: |
          build-std-${{ runner.os }}-${{ matrix.target }}-
    - name: Build
      env:
        RUSTFLAGS: -D warnings
        # RUSTC_BOOTSTRAP=1 allows use of -Z build-std on stable toolchain
        # Required because win7 targets aren't officially supported in stable
        RUSTC_BOOTSTRAP: "${{ contains(matrix.target, 'win7') && '1' || '' }}"
      run: cargo build --release --all --exclude mla-fuzz-afl --verbose ${{ matrix.cargo_arg }}
    - name: Run tests (Windows)
      # as rustdoc.exe has stack overflows with current tests (likely due to ml-dsa expansion) in mla/lib.rs
      if: matrix.os == 'windows-2025'
      env:
        # RUSTC_BOOTSTRAP=1 allows use of -Z build-std on stable toolchain
        # Required because win7 targets aren't officially supported in stable
        RUSTC_BOOTSTRAP: "${{ contains(matrix.target, 'win7') && '1' || '' }}"     
      run: cargo test --all --lib --bins --tests --exclude mla-fuzz-afl --release --verbose ${{ matrix.cargo_arg }}
    - name: Run tests (Linux/macOS)
      if: matrix.os != 'windows-2025'    
      run: cargo test --all --exclude mla-fuzz-afl --release --verbose

  long-tests:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Run long tests
      run: cd mla && cargo test --release -- --ignored

  all-features:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Run long tests
      run: cargo test --all-features --all --exclude mla-fuzz-afl --exclude mla-bindings-c --release

  test-bindings-c-cpp-linux:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Run C bindings tests on Linux
      working-directory: bindings/C/tests/linux-gcc-g++/
      run: make CC=gcc
    - name: Run C bindings tests on Linux
      working-directory: bindings/C/tests/linux-gcc-g++/
      run: make CC=g++

  test-bindings-c-cpp-windows:
    strategy:
      matrix:
        version: [Debug-c, Release-c, Debug-cpp, Release-cpp]
        target: [x86_64-pc-windows-msvc, i686-pc-windows-msvc]
        include:
          - version: Debug-c
            cargo_arg: ""
          - version: Release-c
            cargo_arg: --release
          - version: Debug-cpp
            cargo_arg: ""
          - version: Release-cpp
            cargo_arg: --release
          - target: i686-pc-windows-msvc
            msvc_platform: Win32
          - target: x86_64-pc-windows-msvc
            msvc_platform: x64
    runs-on: windows-2025

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false
    - name: Set target if any
      run: rustup target add ${{ matrix.target }}
    - uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0
    - name: Compile C/CPP bindings test program for Windows
      working-directory: bindings/C/tests/windows-msvc/
      run: msbuild mla-bindings-test.sln /p:Platform=${{ matrix.msvc_platform }} /p:Configuration=${{ matrix.version }}
    - name: Run C/CPP bindings test program on Windows
      working-directory: bindings/C/tests/windows-msvc/
      run: ./${{ matrix.msvc_platform }}/${{ matrix.version }}/mla-bindings-test.exe

  afl-build:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: apt-get update && apt-get install -y llvm
      - name: Install cargo-afl binary crate
        run: cargo install cargo-afl
      - name: Test AFL build
        env:
          RUSTFLAGS: -D warnings
        run: cargo afl build

  fmt:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Check format
        run: cargo fmt --all -- --check

  audit:
    permissions:
      # allow to write a Check report which blocks PR on failures cf. https://github.com/rustsec/audit-check#granular-permissions
      checks: write
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Security audit
        uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          # As documented in README, we do not care enough for side channel attacks to update to an rc version of ml-dsa. Will update when final ml-dsa version is released.
          ignore: RUSTSEC-2025-0144
          token: ${{ secrets.GITHUB_TOKEN }}

  clippy:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install dependencies
        run: apt-get update && apt-get install -y llvm
      - name: Install cargo-afl binary crate
        run: cargo install cargo-afl
      - name: Install clippy
        run: rustup component add clippy
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  publish-dry-run:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Dry-run publish mla
        run: cd mla && cargo publish --dry-run
      - name: Dry-run publish mlar
        run: cd mlar && cargo publish --dry-run
      
