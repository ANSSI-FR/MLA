name: mla release
# This workflow builds and releases MLA library artifacts across all platforms,
# including support for legacy Windows 7 targets via custom tier-3 builds.

permissions: {}

on:
  push:
    tags:
      - "mla-v*"

env:
  GITHUB_REF: "${{ github.ref }}"

jobs:
  build:
    strategy:
      matrix:
        build:
          [
            linux-x86_64,
            windows-i686,
            windows-x86_64,
            windows-i686-debug,
            windows-x86_64-debug,
          ]
        include:
          - build: linux-x86_64
            os: ubuntu-24.04
            # use a pinned Rust toolchain via a Linux container for reproducible builds
            container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
            target: x86_64-unknown-linux-musl
            cargo_arg: --release
            path: |
              ./target/x86_64-unknown-linux-musl/release/libmla.a
          - build: windows-i686
            os: windows-2025
            # not available: set container value to null
            container: null
            target: i686-pc-windows-msvc
            msvc_platform: Win32
            cargo_arg: --release
            path: |
              ./target/i686-pc-windows-msvc/release/mla.lib
              ./target/i686-pc-windows-msvc/release/mla.dll
              ./target/i686-pc-windows-msvc/release/mla.dll.lib
              ./target/i686-pc-windows-msvc/release/mla.pdb
          - build: windows-x86_64
            os: windows-2025
            # not available: set container value to null
            container: null
            target: x86_64-pc-windows-msvc
            msvc_platform: x64
            cargo_arg: --release
            path: |
              ./target/x86_64-pc-windows-msvc/release/mla.lib
              ./target/x86_64-pc-windows-msvc/release/mla.dll
              ./target/x86_64-pc-windows-msvc/release/mla.dll.lib
              ./target/x86_64-pc-windows-msvc/release/mla.pdb
          - build: windows-i686-debug
            os: windows-2025
            # not available: set container value to null
            container: null
            target: i686-pc-windows-msvc
            msvc_platform: Win32
            cargo_arg: ""
            path: |
              ./target/i686-pc-windows-msvc/debug/mla.lib
              ./target/i686-pc-windows-msvc/debug/mla.dll
              ./target/i686-pc-windows-msvc/debug/mla.dll.lib
              ./target/i686-pc-windows-msvc/debug/mla.pdb
          - build: windows-x86_64-debug
            os: windows-2025
            # not available: set container value to null
            container: null
            target: x86_64-pc-windows-msvc
            msvc_platform: x64
            cargo_arg: ""
            path: |
              ./target/x86_64-pc-windows-msvc/debug/mla.lib
              ./target/x86_64-pc-windows-msvc/debug/mla.dll
              ./target/x86_64-pc-windows-msvc/debug/mla.dll.lib
              ./target/x86_64-pc-windows-msvc/debug/mla.pdb
          - build: windows7-i686 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: i686-win7-windows-msvc
            msvc_platform: Win32
            cargo_arg: --release -Z build-std # Build std from source, needed for tier 3 target
            path: |
              ./target/i686-win7-windows-msvc/release/mla.lib
              ./target/i686-win7-windows-msvc/release/mla.dll
              ./target/i686-win7-windows-msvc/release/mla.dll.lib
              ./target/i686-win7-windows-msvc/release/mla.pdb
          - build: windows7-x86_64 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: x86_64-win7-windows-msvc
            msvc_platform: x64
            cargo_arg: --release -Z build-std # Build std from source, needed for tier 3 target
            path: |
              ./target/x86_64-win7-windows-msvc/release/mla.lib
              ./target/x86_64-win7-windows-msvc/release/mla.dll
              ./target/x86_64-win7-windows-msvc/release/mla.dll.lib
              ./target/x86_64-win7-windows-msvc/release/mla.pdb

    runs-on: ${{ matrix.os }}
    container: ${{matrix.container}}

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0
        if: matrix.msvc_platform
      - name: Set target if any
        # Skip rustup target add for win7 targets — rustup doesn't support these tier-3 targets
        if: matrix.target && !contains(matrix.target, 'win7')
        run: rustup target add ${{ matrix.target }}
      - name: Install rust-src (only for win7)
        # For win7 targets, manually build std by installing rust-src
        if: contains(matrix.target, 'win7')
        run: rustup component add rust-src
      - name: Cache build-std artifacts (only for win7)
        # Only apply caching to Win7 tier-3 targets that require build-std
        if: contains(matrix.target, 'win7')
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          # Cache the parts of target/ that contain compiled std artifacts for the given target
          path: |
            target/${{ matrix.target }}/release/build
            target/${{ matrix.target }}/release/deps
            target/${{ matrix.target }}/release/.fingerprint
          # Unique cache key: includes OS, target, and hash of Cargo.lock
          key: build-std-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          # If there's no exact match, fall back to older caches for the same target
          restore-keys: |
            build-std-${{ runner.os }}-${{ matrix.target }}-
          lookup-only: true
      - name: Build static library (inside container)
        if: matrix.container != null
        run: cargo build ${{ matrix.cargo_arg }} --manifest-path=bindings/C/Cargo.toml --target=${{ matrix.target }}
      - name: Build static library (outside container)
        if: matrix.container == null
        env:
          # RUSTC_BOOTSTRAP=1 allows use of -Z build-std on stable toolchain
          # Required because win7 targets aren't officially supported in stable
          RUSTC_BOOTSTRAP: "${{ contains(matrix.target, 'win7') && '1' || '' }}"
        run: cargo build ${{ matrix.cargo_arg }} --manifest-path=bindings/C/Cargo.toml --target=${{ matrix.target }}
      - name: Upload resulting 'mla'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mla-${{ matrix.build }}
          path: ${{ matrix.path }}

  release:
    permissions:
      # Used to generate artifact attestation
      attestations: write
      # Used to upload release artifacts
      contents: write
      # Use to sign the release artifacts
      id-token: write
    # From https://github.com/cloudflare/wrangler/blob/master/.github/workflows/release.yml
    name: GitHub Release
    needs: build
    runs-on: ubuntu-24.04
 
    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit    
      - name: Query version number
        id: get_version
        shell: bash
        run: |
          echo "using version tag ${GITHUB_REF:15}"
          echo "version=${GITHUB_REF:15}" >> $"GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download linux-x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mla-linux-x86_64
          path: mla-linux-x86_64

      - name: Download windows-i686 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mla-windows-i686
          path: mla-windows-i686

      - name: Download windows-x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mla-windows-x86_64
          path: mla-windows-x86_64

      - name: Download windows-i686-debug artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mla-windows-i686-debug
          path: mla-windows-i686-debug

      - name: Download windows-x86_64-debug artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mla-windows-x86_64-debug
          path: mla-windows-x86_64-debug

      - name: Download windows7-i686 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: mla-windows7-i686
          path: mla-windows7-i686

      - name: Download windows7-x86_64 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          name: mla-windows7-x86_64
          path: mla-windows7-x86_64

      - name: Zip Windows releases
        run: |
          zip --junk-paths windows-i686-"${VERSION_OUTPUT}" mla-windows-i686/mla.dll mla-windows-i686/mla.lib mla-windows-i686/mla.dll.lib mla-windows-i686/mla.pdb
          zip --junk-paths windows-x86_64-"${VERSION_OUTPUT}" mla-windows-x86_64/mla.dll mla-windows-x86_64/mla.lib mla-windows-x86_64/mla.dll.lib mla-windows-x86_64/mla.pdb
          zip --junk-paths windows-i686-debug-"${VERSION_OUTPUT}" mla-windows-i686-debug/mla.dll mla-windows-i686-debug/mla.lib mla-windows-i686-debug/mla.dll.lib mla-windows-i686-debug/mla.pdb
          zip --junk-paths windows-x86_64-debug-"${VERSION_OUTPUT}" mla-windows-x86_64-debug/mla.dll mla-windows-x86_64-debug/mla.lib mla-windows-x86_64-debug/mla.dll.lib mla-windows-x86_64-debug/mla.pdb
          zip --junk-paths windows7-i686-"${VERSION_OUTPUT}" mla-windows7-i686/mla.dll mla-windows7-i686/mla.lib mla-windows7-i686/mla.dll.lib mla-windows7-i686/mla.pdb
          zip --junk-paths windows7-x86_64-"${VERSION_OUTPUT}" mla-windows7-x86_64/mla.dll mla-windows7-x86_64/mla.lib mla-windows7-x86_64/mla.dll.lib mla-windows7-x86_64/mla.pdb
        env:
          VERSION_OUTPUT: ${{ steps.get_version.outputs.VERSION }}
      - name: Rename Linux artifact
        run: |
          mv mla-linux-x86_64/libmla.a \
          mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a
        env:
          VERSION_OUTPUT: ${{ steps.get_version.outputs.VERSION }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        
      - name: Sign all zip files
        run: |
          files_to_sign=(
            ./windows-i686-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-"${VERSION_OUTPUT}".zip
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip
            ./windows7-i686-"${VERSION_OUTPUT}".zip
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip
            ./bindings/C/mla.h
            ./bindings/C/mla.hpp
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a)
            for files in "${files_to_sign[@]}"; do
            echo "Signing $files ..."
            cosign sign-blob \
              --yes \
              --output-signature "$files.sig" \
              --output-certificate "$files.cert" \
              "$files"
          done
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: mla-${{ steps.get_version.outputs.VERSION }}
          draft: true
          body: |
            Verification of assets

            This release assets are built by GitHub Runners and are attested
            (https://docs.github.com/en/actions/concepts/security/artifact-attestations).

            To verify the provenance and transparency of assets you download, you can run
            `gh attestation verify --repo ANSSI-FR/MLA <file-path>`

            Changelog
            https://github.com/ANSSI-FR/MLA/blob/mla-v"${VERSION_OUTPUT}"/mla/CHANGELOG.md
          files: |
            ./windows-i686-"${VERSION_OUTPUT}".zip
            ./windows-i686-"${VERSION_OUTPUT}".zip.sig
            ./windows-i686-"${VERSION_OUTPUT}".zip.cert
            ./windows-x86_64-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-"${VERSION_OUTPUT}".zip.sig
            ./windows-x86_64-"${VERSION_OUTPUT}".zip.cert
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip.sig
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip.cert
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip.sig
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip.cert
            ./windows7-i686-"${VERSION_OUTPUT}".zip
            ./windows7-i686-"${VERSION_OUTPUT}".zip.sig
            ./windows7-i686-"${VERSION_OUTPUT}".zip.cert
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip.sig
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip.cert
            ./bindings/C/mla.h
            ./bindings/C/mla.h.sig
            ./bindings/C/mla.h.cert
            ./bindings/C/mla.hpp
            ./bindings/C/mla.hpp.sig
            ./bindings/C/mla.hpp.cert
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a.sig
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a.cert
        env:
          VERSION_OUTPUT: ${{ steps.get_version.outputs.VERSION }}

      - name: Attest artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            ./windows-i686-"${VERSION_OUTPUT}".zip
            ./windows-i686-"${VERSION_OUTPUT}".zip.sig
            ./windows-i686-"${VERSION_OUTPUT}".zip.cert
            ./windows-x86_64-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-"${VERSION_OUTPUT}".zip.sig
            ./windows-x86_64-"${VERSION_OUTPUT}".zip.cert
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip.sig
            ./windows-i686-debug-"${VERSION_OUTPUT}".zip.cert
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip.sig
            ./windows-x86_64-debug-"${VERSION_OUTPUT}".zip.cert
            ./windows7-i686-"${VERSION_OUTPUT}".zip
            ./windows7-i686-"${VERSION_OUTPUT}".zip.sig
            ./windows7-i686-"${VERSION_OUTPUT}".zip.cert
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip.sig
            ./windows7-x86_64-"${VERSION_OUTPUT}".zip.cert
            ./bindings/C/mla.h
            ./bindings/C/mla.h.sig
            ./bindings/C/mla.h.cert
            ./bindings/C/mla.hpp
            ./bindings/C/mla.hpp.sig
            ./bindings/C/mla.hpp.cert
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a.sig
            ./mla-linux-x86_64/libmla-x86_64-static-"${VERSION_OUTPUT}".a.cert
        env:
          VERSION_OUTPUT: ${{ steps.get_version.outputs.VERSION }}

  publish:
    name: Publish mla
    needs: release
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
    environment:
      name: cratesio
    permissions:
      id-token: write

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit    
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish to crates.io
        run: cargo publish --package mla
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

