name: Deploy mdBook to GitHub Pages

permissions: {}

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions-rs/toolchain@16499b5e05bf2e26879000db0c1d13f7e13fa3af # v1.0.7
        with:
          # Pin Rust toolchain for releases to a known-good previous stable release (1.91.1)
          # for increased stability and security.
          # Rust does not provide an "old-stable" channel, so we explicitly specify the version (including its patch level, e.g. 1.91.1).
          toolchain: 1.91.1
          # For non-release builds, use 'stable'.
          # toolchain: stable

      - name: Install mdbook
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1.0.3
        with:
          command: install
          args: mdbook mdbook-katex --locked

      - name: Install mdbook-katex
        uses: actions-rs/cargo@844f36862e911db73fe0815f00a4a2602c279505 # v1.0.3
        with:
          command: install
          args: --git https://github.com/lzanini/mdbook-katex --rev 5bb959bb61945e863f5b9d28425bb201d4054994 mdbook-katex --locked

      # GitHub Flavored Markdown's ```math blocks are not supported by GitHub Pages,
      # but KaTeX requires $$ math delimiters. This step converts ```math blocks to $$ blocks.
      - name: Preprocess markdown files - convert ```math blocks to $$ blocks
        run: |
          find ./doc/src -name '*.md' -exec sh -c '
            awk '\''
              /^```math$/ { in_math=1; print "$$"; next }
              /^```$/ && in_math { in_math=0; print "$$"; next }
              { print }
            '\'' "$1" > tmp && mv tmp "$1"
          ' sh {} \;

      - name: Build the book
        run: mdbook build ./doc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./doc/book

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages # GitHub automatically uses this environment for Pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write  # Needed for gh-pages push
      id-token: write  # Needed for GitHub Pages deployment

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
