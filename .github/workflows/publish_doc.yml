name: Deploy mdBook to GitHub Pages

permissions: {}

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install mdbook
        run: cargo install mdbook mdbook-katex --locked

      - name: Install mdbook-katex
        run: cargo install --git https://github.com/lzanini/mdbook-katex --rev 5bb959bb61945e863f5b9d28425bb201d4054994 mdbook-katex --locked

      # GitHub Flavored Markdown's ```math blocks are not supported by GitHub Pages,
      # but KaTeX requires $$ math delimiters. This step converts ```math blocks to $$ blocks.
      - name: Preprocess markdown files - convert ```math blocks to $$ blocks
        run: |
          find ./doc/src -name '*.md' -exec sh -c '
            awk '\''
              /^```math$/ { in_math=1; print "$$"; next }
              /^```$/ && in_math { in_math=0; print "$$"; next }
              { print }
            '\'' "$1" > tmp && mv tmp "$1"
          ' sh {} \;

      - name: Build the book
        run: mdbook build ./doc

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./doc/book

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages # GitHub automatically uses this environment for Pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write  # Needed for gh-pages push
      id-token: write  # Needed for GitHub Pages deployment

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
