name: mlar release
# This workflow builds and releases the MLAR binary across major platforms,
# including legacy Windows 7 targets using tier-3 targets and custom std builds.

permissions: {}

on:
  push:
    tags:
      - "mlar-v*"

env:
  GITHUB_REF: "${{ github.ref }}"

jobs:
  build:
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-24.04
            # use a pinned Rust toolchain via a Linux container for reproducible builds
            container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
            target: x86_64-unknown-linux-musl
            cargo_build: --target x86_64-unknown-linux-musl
          - build: macos
            os: macos-15
            # not available: set container value to null
            container: null
          - build: windows
            os: windows-2025
            # not available: set container value to null
            container: null
            extension: .exe
          - build: windows7-i686 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: i686-win7-windows-msvc
            cargo_build: --target i686-win7-windows-msvc -Z build-std # Build std from source, needed for tier 3 target
            extension: .exe
          - build: windows7-x86_64 # Win7-compatible build using tier 3 target
            os: windows-2025
            # not available: set container value to null
            container: null
            target: x86_64-win7-windows-msvc
            cargo_build: --target x86_64-win7-windows-msvc -Z build-std # Build std from source, needed for tier 3 target
            extension: .exe

    runs-on: ${{matrix.os}}
    container: ${{matrix.container}}

    steps:
    - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
      with:
        egress-policy: audit  
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false 
    - name: Set target if any
      # Skip rustup target add for win7 targets — rustup doesn't support these tier-3 targets
      if: matrix.target && !contains(matrix.target, 'win7')
      run: rustup target add ${{ matrix.target }}
    - name: Install rust-src (only for win7)
      # For win7 targets, manually build std by installing rust-src
      if: contains(matrix.target, 'win7')
      run: rustup component add rust-src
    - name: Cache build-std artifacts (only for win7)
      # Only apply caching to Win7 tier-3 targets that require build-std
      if: contains(matrix.target, 'win7')
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        # Cache the parts of target/ that contain compiled std artifacts for the given target
        path: |
          target/${{ matrix.target }}/release/build
          target/${{ matrix.target }}/release/deps
          target/${{ matrix.target }}/release/.fingerprint
        # Unique cache key: includes OS, target, and hash of Cargo.lock
        key: build-std-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
        # If there's no exact match, fall back to older caches for the same target
        restore-keys: |
          build-std-${{ runner.os }}-${{ matrix.target }}-
        lookup-only: true
    - name: Build (inside container)
      if: matrix.container != null
      run: cargo build --release --all-features --package mlar --verbose ${{ matrix.cargo_build }}
    - name: Build (outside container)
      if: matrix.container == null
      env:
        # RUSTC_BOOTSTRAP=1 allows use of -Z build-std on stable toolchain
        # Required because win7 targets aren't officially supported in stable
        RUSTC_BOOTSTRAP: "${{ contains(matrix.target, 'win7') && '1' || '' }}"
      run: cargo build --release --all-features --package mlar --verbose ${{ matrix.cargo_build }}
    - name: Upload resulting 'mlar'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: mlar-${{ matrix.build }}
        path: ./target/${{ matrix.target }}/release/mlar${{ matrix.extension }}

  release:
    permissions:
      # Used to generate artifact attestation
      attestations: write
      # Used to upload release artifacts
      contents: write
      # Use to sign the release artifacts
      id-token: write
    # From https://github.com/cloudflare/wrangler/blob/master/.github/workflows/release.yml
    name: GitHub Release
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit
      - name: Query version number
        id: get_version
        shell: bash
        run: |
          echo "using version tag ${GITHUB_REF:15}"
          echo "version=${GITHUB_REF:15}" >> $"GITHUB_OUTPUT"
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - name: Download Linux artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mlar-linux
          path: mlar-linux

      - name: Download Windows artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mlar-windows
          path: mlar-windows

      - name: Download Windows 32-bit Win7 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mlar-windows7-i686
          path: mlar-windows7-i686

      - name: Download Windows 64-bit Win7 artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mlar-windows7-x86_64
          path: mlar-windows7-x86_64

      - name: Download MacOS artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: mlar-macos
          path: mlar-macos
      - name: Rename artifacts
        run: |
          mv ./mlar-linux/mlar ./mlar-linux/mlar-linux-static-"${VERSION}"
          mv ./mlar-windows/mlar.exe ./mlar-windows/mlar-windows-"${VERSION}".exe
          mv ./mlar-windows7-i686/mlar.exe ./mlar-windows7-i686/mlar-windows7-i686-"${VERSION}".exe
          mv ./mlar-windows7-x86_64/mlar.exe ./mlar-windows7-x86_64/mlar-windows7-x86_64-"${VERSION}".exe
          mv ./mlar-macos/mlar ./mlar-macos/mlar-macos-"${VERSION}"
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        
      - name: Sign all files
        run: |
          files_to_sign=(
            ./mlar-linux/mlar-linux-static-"${VERSION}"
            ./mlar-windows/mlar-windows-"${VERSION}".exe
            ./mlar-windows7-i686/mlar-windows7-i686-"${VERSION}".exe
            ./mlar-windows7-x86_64/mlar-windows7-x86_64-"${VERSION}".exe
            ./mlar-macos/mlar-macos-"${VERSION}")
            for files in "${files_to_sign[@]}"; do
            echo "Signing $files ..."
            cosign sign-blob \
              --yes \
              --output-signature "$files.sig" \
              --output-certificate "$files.cert" \
              "$files"
            done
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          
      - name: Create Release and upload artifacts
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          name: mlar-${{ steps.get_version.outputs.VERSION }}
          draft: true
          body: |
            Verification of assets
            
            This release assets are built by GitHub Runners and are attested so ( https://docs.github.com/en/actions/concepts/security/artifact-attestations ).
            
            To verify the provenance and transparency of assets you download, you can run `gh attestation verify --repo ANSSI-FR/MLA <file-path>` where `<file-path>` is the file path to the downloaded asset.
            
            To do this without a GitHub account, you can first download the trusted root with `gh attestation trusted-root > ./trusted-root.jsonl`, download the attestation at https://github.com/ANSSI-FR/MLA/attestations to `./attestation.json` and run `gh attestation verify --repo ANSSI-FR/MLA --bundle ./attestation.json --custom-trusted-root ./trusted-root.jsonl <file-path>`.
            
            Changelog
            
            https://github.com/ANSSI-FR/MLA/blob/mlar-v"${VERSION}"/mlar/CHANGELOG.md
          files: |
            ./mlar-linux/mlar-linux-static-"${VERSION}"
            ./mlar-linux/mlar-linux-static-"${VERSION}".sig
            ./mlar-linux/mlar-linux-static-"${VERSION}".cert
            ./mlar-windows/mlar-windows-"${VERSION}".exe
            ./mlar-windows/mlar-windows-"${VERSION}".exe.sig
            ./mlar-windows/mlar-windows-"${VERSION}".exe.cert
            ./mlar-windows7-i686/mlar-windows7-i686-"${VERSION}".exe
            ./mlar-windows7-i686/mlar-windows7-i686-"${VERSION}".exe.sig
            ./mlar-windows7-i686/mlar-windows7-i686-"${VERSION}".exe.cert
            ./mlar-windows7-x86_64/mlar-windows7-x86_64-"${VERSION}".exe
            ./mlar-windows7-x86_64/mlar-windows7-x86_64-"${VERSION}".exe.sig
            ./mlar-windows7-x86_64/mlar-windows7-x86_64-"${VERSION}".exe.cert
            ./mlar-macos/mlar-macos-"${VERSION}"
            ./mlar-macos/mlar-macos-"${VERSION}".sig
            ./mlar-macos/mlar-macos-"${VERSION}".cert
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
      - name: Attest artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:  
          subject-path: |
            ./mlar-linux/mlar
            ./mlar-windows/mlar.exe
            ./mlar-windows7-i686/mlar.exe
            ./mlar-windows7-x86_64/mlar.exe
            ./mlar-macos/mlar

  publish:
    name: Publish mlar
    needs: release
    runs-on: ubuntu-24.04
    container: rust@sha256:ecbe59a8408895edd02d9ef422504b8501dd9fa1526de27a45b73406d734d659 # v1.93.1 : pin to known-good previous stable release for increased stability and security
    environment:
      name: cratesio
    permissions:
      id-token: write

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit    
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false 
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - name: Publish to crates.io
        run: cargo publish --package mlar
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
